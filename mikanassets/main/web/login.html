<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>server-bot — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#21262d;border:1px solid #30363d;border-radius:12px;padding:40px;width:90%;max-width:380px}
.logo{font-size:1.6rem;font-weight:800;color:#58a6ff;margin-bottom:4px}
.subtitle{font-size:.85rem;color:#8b949e;margin-bottom:32px}
label{display:block;font-size:.82rem;color:#8b949e;margin-bottom:6px}
input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 14px;color:#e6edf3;font-size:.9rem;outline:none;margin-bottom:16px;transition:border-color .15s}
input:focus{border-color:#58a6ff}
button{width:100%;background:#238636;border:1px solid #2ea043;border-radius:8px;padding:11px;color:#e6edf3;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .15s}
button:hover{opacity:.85}
.err{background:#3a1a1a;border:1px solid #f85149;border-radius:8px;padding:10px 14px;color:#f85149;font-size:.82rem;margin-bottom:16px}
.hint{font-size:.78rem;color:#8b949e;margin-top:16px;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="logo">server-bot</div>
  <div class="subtitle">Management Panel</div>
  {% with messages = get_flashed_messages() %}
  {% if messages %}
  <div class="err">{% for m in messages %}{{ m }}{% endfor %}</div>
  {% endif %}
  {% endwith %}
  <form method="POST">
    <label>Access Token</label>
    <input type="password" name="token" id="token" placeholder="Paste your token here" required autofocus>
    <button type="submit">Login</button>
  </form>
  <p class="hint">Generate a token with <code>/tokengen</code> in Discord.</p>
</div>
</body>
</html>
